function loadData(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveData(k,d){localStorage.setItem(k,JSON.stringify(d));}

function AP(){return loadData('his_patients');}

function nextId(list,prefix){
  var max=0;list.forEach(function(x){var n=parseInt(x.id.replace(prefix,''))||0;if(n>max)max=n;});
  return prefix+String(max+1).padStart(3,'0');
}
function nowStr(){
  var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}
function addLog(op,target,desc){
  var logs=AL();logs.push({time:nowStr(),operation:op,target:target,description:desc});SL(logs);
}

// ==================== Toast ====================
function toast(msg,isErr){
  var t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isErr?' error':'');
  t.style.display='block';clearTimeout(t._tid);t._tid=setTimeout(function(){t.style.display='none';},2000);
}

// ==================== 通用表格 ====================
// cols: [{h:显示名,k:属性键}] 或 [显示名1,显示名2...]（此时键=显示名）
// rows: 数据对象数组
// actions: function(row)返回操作按钮HTML，或null
function makeTable(cols, rows, actions){
  var colDefs=[];
  if(cols.length>0 && typeof cols[0]==='object'){colDefs=cols;}
  else{colDefs=cols.map(function(h){return{h:h,k:h};});}
  var h='<table><thead><tr>';
  colDefs.forEach(function(c){h+='<th>'+c.h+'</th>';});
  if(actions)h+='<th>操作</th>';
  h+='</tr></thead><tbody>';
  if(!rows||rows.length===0){h+='<tr><td colspan="'+(colDefs.length+(actions?1:0))+'" style="text-align:center;color:#999;">暂无数据</td></tr>';}
  else{rows.forEach(function(r){h+='<tr>';
    colDefs.forEach(function(c){h+='<td>'+(r[c.k]!==undefined?r[c.k]:'')+'</td>';});
    if(actions){h+='<td>'+actions(r)+'</td>';}
    h+='</tr>';});}
  h+='</tbody></table>';
  return h;
}

// helper: build colDefs from headers[] and keys[]
function coldef(headers,keys){
  return headers.map(function(h,i){return{h:h,k:keys[i]};});
}

// ==================== 弹窗 ====================
function modal(title,bodyHtml,onSave){
  var overlay=document.getElementById('modal-overlay');
  var box=document.getElementById('modal-box');
  box.innerHTML='<h3>'+title+'</h3>'+bodyHtml+'<div class="form-actions"><button class="btn" id="modal-cancel">取消</button><button class="btn btn-primary" id="modal-save">保存</button></div>';
  overlay.classList.add('show');
  document.getElementById('modal-cancel').onclick=function(){overlay.classList.remove('show');};
  document.getElementById('modal-save').onclick=function(){
    var inputs=box.querySelectorAll('input,select,textarea');
    var data={};inputs.forEach(function(inp){data[inp.name]=inp.value;});
    var err=onSave(data);
    if(!err){overlay.classList.remove('show');}
  };
}

// ==================== 患者数据标准化 ====================
function normalizePatients(){
  var list = AP();
  var changed = false;
  list.forEach(function(p){
    if(!p.id && p.patientId) p.id = p.patientId;
    if(!p.id && p.patient_id) p.id = p.patient_id;
    if(!p.id && p.number) p.id = p.number;
    if(!p.id && p.code) p.id = p.code;
    if(!p.name && p.patientName) p.name = p.patientName;
    if(!p.name && p.realName) p.name = p.realName;
    if(!p.gender && p.sex) p.gender = p.sex;
    if(!p.phone && p.tel) p.phone = p.tel;
    if(!p.phone && p.telephone) p.phone = p.telephone;
    if(!p.idCard && p.idcard) { p.idCard = p.idcard; delete p.idcard; changed = true; }
    if(!p.idCard && p.idNumber) p.idCard = p.idNumber;
    if(!p.idCard && p.identityCard) p.idCard = p.identityCard;
    if(!p.idCard && p.cardId) p.idCard = p.cardId;
    if(!p.address && p.addr) p.address = p.addr;
    if(!p.complaint && p.symptom) { p.complaint = p.symptom; delete p.symptom; changed = true; }
    if(!p.complaint && p.symptoms) p.complaint = p.symptoms;
    if(!p.complaint && p.description) p.complaint = p.description;
    if(!p.status && p.visitStatus) p.status = p.visitStatus;
    if(!p.status && p.patientStatus) p.status = p.patientStatus;
  });
  if(changed) SP(list);
}

function getEffectiveMenu(){
  if(!g_user)return[];
  if(g_user.role===ROLES.ADMIN)return MENUS[ROLES.ADMIN];
  if(g_user.role===ROLES.DOCTOR){
    if(g_user.dept && CHECK_DEPTS.indexOf(g_user.dept)>=0)return MENUS['check_doctor'];
    return MENUS[ROLES.DOCTOR];
  }
  return MENUS[g_user.role]||[];
}

function checkPermission(pageId){
  if(!g_user){
    if(PUBLIC_PAGES.indexOf(pageId)>=0)return true;
    return false;
  }
  if(g_user.role===ROLES.ADMIN)return true;
  var menu=getEffectiveMenu();
  for(var i=0;i<menu.length;i++){
    for(var j=0;j<menu[i].items.length;j++){
      if(menu[i].items[j].id===pageId)return true;
    }
  }
  if(PUBLIC_PAGES.indexOf(pageId)>=0)return true;
  return false;
}

function refreshSidebar(){
  var menu=getEffectiveMenu();
  var sidebar=document.getElementById('sidebar-menu');
  if(!sidebar)return;
  var h='';
  if(!g_user){
    h+='<div class="menu-group"><div class="menu-group-title">公开访问</div>';
    h+='<button class="menu-item" data-page="patient_self_service">🤗 患者自助服务</button>';
    h+='<button class="menu-item" data-page="bigscreen">🖥️ 医疗大屏</button>';
    h+='</div>';
  }else{
    menu.forEach(function(group){
      h+='<div class="menu-group"><div class="menu-group-title">'+group.title+'</div>';
      group.items.forEach(function(item){
        h+='<button class="menu-item" data-page="'+item.id+'">'+item.label+'</button>';
      });
      h+='</div>';
    });
  }
  sidebar.innerHTML=h;
}

function refreshUserbar(){

  bar.innerHTML='<div class="user-info"><span>👤 <b>'+g_user.name+'</b></span><span class="role-badge '+roleClass+'">'+ROLE_NAMES[g_user.role]+'</span><span style="font-size:12px;color:#999;">登录时间：'+g_user.loginTime+'</span></div><button class="btn-logout" id="btn-logout">退出登录</button>';
  document.getElementById('btn-logout').onclick=doLogout;
}

function doInternalLogin(username,password){
  var accounts=loadData('his_accounts');
  var acc=null;
  for(var i=0;i<accounts.length;i++){if(accounts[i].username===username){acc=accounts[i];break;}}
  if(!acc)return'账号不存在';
  var now=Math.floor(Date.now()/1000);
  if(acc.lockTime && now<acc.lockTime)return'账号已锁定，请稍后再试';
  if(acc.password!==password){
    acc.errorCount=(acc.errorCount||0)+1;
    if(acc.errorCount>=3){acc.lockTime=now+60;acc.errorCount=0;}
    saveData('his_accounts',accounts);
    if(acc.lockTime)return'密码错误已达3次，账号锁定60秒';
    return'密码错误，还剩'+(3-acc.errorCount)+'次机会';
  }
  acc.errorCount=0;acc.lockTime=0;saveData('his_accounts',accounts);
  var dept='';
  if(acc.role===ROLES.DOCTOR){
    var docs=AD(),d=null;for(var j=0;j<docs.length;j++){if(docs[j].id===acc.username){d=docs[j];break;}}
    if(d)dept=d.dept||'';
  }
  g_user={username:acc.username,name:acc.realName,role:acc.role,gender:acc.gender,dept:dept,loginTime:nowStr()};
  try{localStorage.setItem('his_session',JSON.stringify(g_user));}catch(e){}
  refreshSidebar();refreshUserbar();
  if(g_user.role===ROLES.PATIENT)showPage('patient_dashboard');else showPage('dashboard');
  addLog('登录系统',acc.username,acc.realName+' ('+ROLE_NAMES[acc.role]+')');
  return null;
}

function doPatientLogin(patientId,idCard){
  var patients=AP();
  var p=null;
  for(var i=0;i<patients.length;i++){if(patients[i].id===patientId){p=patients[i];break;}}
  if(!p)return'患者编号不存在';
  var card=(p.idCard||'').replace(/\s/g,''),input=(idCard||'').replace(/\s/g,'');
  if(card!==input)return'身份证号不匹配';

    var regs=AR();var opts='';regs.forEach(function(r){opts+='<option value="'+r.id+'">'+r.id+' '+r.patientName+' ('+r.status+')</option>';});
    modal('手动加入排队','<div class="form-row"><label>挂号记录</label><select name="regId">'+opts+'</select></div>',function(dd){
      var r=regs.find(function(x){return x.id===dd.regId;});if(!r)return toast('请选择',1);
      if(r.status==='候诊中'||r.status==='接诊中')return toast('已在队列中',1);
      var wq2=AW();var qno=1;wq2.forEach(function(w){if(w.doctorName===r.doctorName&&w.status==='候诊中')qno++;});

      wq2.push({queueId:qid,regId:r.id,patientId:r.patientId,patientName:r.patientName,dept:r.dept,doctorName:r.doctorName,queueNo:qno,status:'候诊中'});
      r.status='候诊中';r.queueNo=qno;SR(regs);SW(wq2);
      addLog('手动加入队列',qid,r.patientName);toast('已加入');refreshWQ();
    });
  };
}

  main.innerHTML='<h2 class="page-title">住院管理</h2><div class="toolbar"><button class="btn btn-primary" id="ip-add">新增住院</button></div><div id="ip-table"></div>';
  refreshIP();
  document.getElementById('ip-add').onclick=function(){ipForm(null);};
};
function refreshIP(){
  var ips=AI();
  document.getElementById('ip-table').innerHTML=makeTable(coldef(['住院编号','患者','科室','主治医生','病房','床位','入院时间','出院时间','状态','费用'],['id','patientName','dept','doctorName','ward','bed','admitTime','dischargeTime','status','fee']),ips,function(r){
    if(r.status==='住院中')return '<button class="btn btn-info btn-sm" onclick="ipForm(\''+r.id+'\')">修改</button> <button class="btn btn-success btn-sm" onclick="dischargeIP(\''+r.id+'\')">办理出院</button>';
    return '<button class="btn btn-info btn-sm" onclick="ipForm(\''+r.id+'\')">查看</button>';
  });
}
function ipForm(iid){
  var ips=AI(),ip=iid?ips.find(function(x){return x.id===iid;}):null;
  var data=ip||{id:'',patientName:'',dept:'',doctorName:'',ward:'',bed:'',status:'住院中',fee:'0',deposit:'0'};
  var ps=AP(),ds=AD();
  var popts='';ps.forEach(function(p){popts+='<option value="'+p.id+'" data-name="'+p.name+'">'+p.name+' ('+p.id+')</option>';});
  var dopts='';ds.forEach(function(d){dopts+='<option value="'+d.id+'" data-name="'+d.name+'" data-dept="'+d.dept+'">'+d.name+' ('+d.dept+')</option>';});
  modal(ip?'修改住院记录':'新增住院记录',
    (ip?'<div class="form-row"><label>编号</label><input name="id" value="'+data.id+'" readonly></div>':'')+
    '<div class="form-row"><label>患者</label><select name="patientId">'+popts+'</select></div>'+
    '<div class="form-row"><label>医生</label><select name="doctorId">'+dopts+'</select></div>'+
    '<div class="form-row"><label>科室</label><input name="dept" value="'+data.dept+'"></div>'+
    '<div class="form-row"><label>病房号</label><input name="ward" value="'+data.ward+'"></div>'+
    '<div class="form-row"><label>床位号</label><input name="bed" value="'+data.bed+'"></div>'+
    '<div class="form-row"><label>状态</label><select name="status"><option value="住院中">住院中</option><option value="已出院">已出院</option></select></div>'+
    '<div class="form-row"><label>住院费用</label><input name="fee" type="number" step="0.01" value="'+data.fee+'"></div>'+
    '<div class="form-row"><label>押金</label><input name="deposit" type="number" step="0.01" value="'+data.deposit+'"></div>',
    function(dd){
      if(!dd.patientId||!dd.doctorId)return toast('请选择患者和医生',1);
      var selP=ps.find(function(x){return x.id===dd.patientId;});
      var selD=ds.find(function(x){return x.id===dd.doctorId;});
      var list2=AI();
      if(ip){var i=list2.findIndex(function(x){return x.id===iid;});if(i>=0){list2[i].patientId=dd.patientId;list2[i].patientName=selP?selP.name:'';list2[i].dept=dd.dept;list2[i].doctorName=selD?selD.name:'';list2[i].ward=dd.ward;list2[i].bed=dd.bed;list2[i].status=dd.status;list2[i].fee=parseFloat(dd.fee)||0;list2[i].deposit=parseFloat(dd.deposit)||0;}}
      else{list2.push({id:nextId(list2,'IN'),patientId:dd.patientId,patientName:selP?selP.name:'',dept:dd.dept,doctorName:selD?selD.name:'',ward:dd.ward,bed:dd.bed,admitTime:nowStr(),dischargeTime:'',status:'住院中',fee:parseFloat(dd.fee)||0,deposit:parseFloat(dd.deposit)||0});}
      SI(list2);refreshIP();addLog(ip?'修改住院':'新增住院',dd.id||'',selP?selP.name:'');toast(ip?'更新成功':'登记成功');
    }
  );
}
function dischargeIP(iid){
  if(!confirm('确定办理出院 '+iid+' 吗？'))return;
  var ips=AI(),ip=ips.find(function(x){return x.id===iid;});
  if(!ip||ip.status!=='住院中')return toast('不可出院',1);
  ip.status='已出院';ip.dischargeTime=nowStr();SI(ips);
  var bills=AB();bills.push({id:nextId(bills,'BILL'),type:'住院费',patientId:ip.patientId,patientName:ip.patientName,amount:ip.fee,time:nowStr(),status:'已收费',refId:ip.id});
  SB(bills);
  var ps=AP(),p=ps.find(function(x){return x.id===ip.patientId;});if(p)p.status='已完成';SP(ps);
  addLog('办理出院',iid,ip.patientName+' ¥'+ip.fee);toast('出院手续完成！');refreshIP();
}
window.ipForm=ipForm;window.dischargeIP=dischargeIP;

  var bills=AB();

}

  h+='<h3 style="margin:16px 0 8px;">药品库存统计</h3>';
  h+=makeTable(coldef(['编号','名称','库存','单价'],['id','name','stock','price']),ms);

  var docConsult={};regs.filter(function(r){return r.status==='已接诊';}).forEach(function(r){docConsult[r.doctorName]=(docConsult[r.doctorName]||0)+1;});
  h+='<h3 style="margin:16px 0 8px;">医生接诊统计</h3>';

  var ipStatus={};ips.forEach(function(ip){ipStatus[ip.status]=(ipStatus[ip.status]||0)+1;});
  h+='<h3 style="margin:16px 0 8px;">住院状态统计</h3>';
  h+=makeTable(['状态','数量'],['住院中','已出院'].map(function(s){return{'状态':s,'数量':ipStatus[s]||0};}));

  h+='<h3 style="margin:16px 0 8px;">患者综合查询</h3><div class="toolbar"><input id="st-search" placeholder="输入患者姓名..." style="width:200px;"><button class="btn btn-primary" id="st-searchbtn">查询</button></div><div id="st-result"></div>';

    r1+='<h4>预约记录</h4>'+makeTable(coldef(['编号','患者','科室','医生','日期','状态'],['id','patientName','dept','doctorName','apptDate','status']),apts.filter(function(a){return a.patientName.indexOf(q)>=0;}));
    r1+='<h4>住院记录</h4>'+makeTable(coldef(['编号','患者','科室','病房','状态'],['id','patientName','dept','ward','status']),ips.filter(function(ip){return ip.patientName.indexOf(q)>=0;}));

renderers.datamgmt=function(main){
  var h='<h2 class="page-title">数据管理</h2><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">';
  h+='<button class="btn btn-success" id="dm-reset">🔄 重新导入真实数据</button> ';
  h+='<button class="btn btn-danger" id="dm-clear">清空全部数据</button> ';
  h+='<button class="btn btn-info" id="dm-export">导出 JSON</button> ';
  h+='<button class="btn btn-warning" id="dm-import-btn">导入 JSON</button> ';
  h+='<input type="file" id="dm-import-file" accept=".json" style="display:none;"></div><div id="dm-status"></div>';
  main.innerHTML=h;

  document.getElementById('dm-reset').onclick=function(){
    if(!confirm('确定要清空当前数据并重新导入真实数据吗？当前所有修改将丢失。'))return;
    DATA_KEYS.forEach(function(k){localStorage.removeItem(k);});
    initDemoData();
    addLog('系统重置','全部模块','清空数据并重新导入data/目录真实数据');
    showPage('dashboard');
  };
  document.getElementById('dm-clear').onclick=function(){
    if(!confirm('确定清空全部数据吗？此操作不可恢复！'))return;
    DATA_KEYS.forEach(function(k){localStorage.removeItem(k);});
    toast('全部数据已清空');showPage('dashboard');
  };
  document.getElementById('dm-export').onclick=function(){
    var data={};DATA_KEYS.forEach(function(k){data[k]=loadData(k);});
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='HIS_backup_'+nowStr().replace(/[: ]/g,'_')+'.json';a.click();
    addLog('导出JSON','全部数据','数据备份导出');toast('数据已导出！');
  };
  document.getElementById('dm-import-btn').onclick=function(){document.getElementById('dm-import-file').click();};
  document.getElementById('dm-import-file').onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{var data=JSON.parse(ev.target.result);if(!confirm('确定导入数据吗？当前数据将被覆盖。'))return;
        DATA_KEYS.forEach(function(k){if(data[k])saveData(k,data[k]);});
        addLog('导入JSON','全部数据','数据从文件导入恢复');toast('数据导入成功！');showPage('dashboard');
      }catch(ex){toast('文件格式错误！',1);}
    };
    reader.readAsText(file);
  };
};

function ph(title,desc){return'<div class="placeholder-page"><div class="ph-icon">🚧</div><h3>'+title+'</h3><p>'+desc+'</p></div>';}
renderers.accounts=function(main){main.innerHTML='<h2 class="page-title">账号管理</h2><div id="acc-table"></div>';refreshAccounts();};
function refreshAccounts(){
  var accs=loadData('his_accounts');
  var data=accs.map(function(a){return{username:a.username,realName:a.realName,gender:a.gender,roleName:ROLE_NAMES[a.role]||a.role,onDuty:a.isOnDuty?'在岗':'离岗',errorCount:a.errorCount,_orig:a};});
  var h=makeTable(coldef(['账号','姓名','性别','角色','在岗状态','错误次数'],['username','realName','gender','roleName','onDuty','errorCount']),data,function(row){
    return '<button class="btn btn-sm btn-danger" onclick="deleteAccount(\''+row._orig.username+'\')">删除</button>';
  });
  document.getElementById('acc-table').innerHTML=h;
}
function deleteAccount(uname){
  if(!confirm('确定删除账号 '+uname+' 吗？'))return;
  var accs=loadData('his_accounts');
  var idx=-1;for(var i=0;i<accs.length;i++){if(accs[i].username===uname){idx=i;break;}}
  if(idx<0)return;accs.splice(idx,1);saveData('his_accounts',accs);addLog('删除账号',uname,'');toast('已删除');refreshAccounts();
}

  if(!g_user||g_user.role!==ROLES.PATIENT){showPage('login');return;}

  main.innerHTML='<h2 class="page-title">账户充值</h2><p>当前余额：<b style="font-size:24px;color:#27a844;">¥'+(p?p.balance||0:0).toFixed(2)+'</b></p>'+
    '<div style="margin-top:16px;"><input type="number" id="recharge-amount" placeholder="充值金额" style="padding:8px;width:200px;"> '+
    '<button class="btn btn-success" id="btn-recharge">充值</button></div>';
  document.getElementById('btn-recharge').onclick=function(){
    var amt=parseFloat(document.getElementById('recharge-amount').value);
    if(!amt||amt<=0)return toast('请输入有效金额',1);
    if(!p)return;
    p.balance=(p.balance||0)+amt;SP(AP());addLog('患者充值',p.id,'¥'+amt.toFixed(2));toast('充值成功！');
    showPage('my_balance');
  };
};

(function(){
  if(AP().length===0){initDemoData();}
  try{
    var session=JSON.parse(localStorage.getItem('his_session'));
    if(session&&session.username){
      g_user=session;
      refreshSidebar();refreshUserbar();
      if(g_user.role===ROLES.PATIENT)showPage('patient_dashboard');
      else showPage('dashboard');
    }else{showPage('login');}
  }catch(e){showPage('login');}
})();
